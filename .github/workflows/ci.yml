name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/ benchmarks/

  # ─── Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install system deps (libgomp for LightGBM)
        run: sudo apt-get update && sudo apt-get install -y libgomp1
      - name: Install package
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e ".[api,dev]"
      - name: Run pytest
        env:
          PYTHONPATH: src
        run: pytest -q tests/

  # ─── Docker build smoke-test ────────────────────────────────────────────
  docker-build:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: edgegrid-forecast:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test — image boots and /v5/healthz responds
        run: |
          docker run -d --name smoke -p 8000:8000 edgegrid-forecast:ci
          # give uvicorn time to bind
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/v5/healthz >/dev/null 2>&1; then
              echo "healthz ok"
              break
            fi
            sleep 2
          done
          docker logs smoke || true
          curl -fsS http://127.0.0.1:8000/v5/healthz | head -c 500 || (echo "healthz never responded"; exit 1)
          docker rm -f smoke
