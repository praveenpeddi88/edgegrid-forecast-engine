version: "3.9"

# Local / staging compose file for the EdgeGrid Forecast Engine.
#   docker compose up --build
# Mounts models and data read-only so the image is deterministic and the
# on-disk bundles are easy to swap without a rebuild.

services:
  forecast:
    build:
      context: .
      dockerfile: Dockerfile
    image: edgegrid-forecast:v5
    container_name: edgegrid-forecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      EDGEGRID_ENV: production
      EDGEGRID_API_HOST: 0.0.0.0
      EDGEGRID_API_PORT: 8000
      PYTHONPATH: /app/src
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./benchmarks/results:/app/benchmarks/results:ro
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v5/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
